name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:${{ github.sha }} .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:${{ github.sha }}
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:${{ github.sha }}

      - name: Tag latest
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:${{ github.sha }} \
          ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:latest

          docker push ${{ secrets.DOCKERHUB_USERNAME }}/php-devops-test:latest